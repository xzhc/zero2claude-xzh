<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>欢迎, xzh!</title>
    <style>
        /* 1. 基础重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 2. 页面主体样式：全屏居中 + 渐变背景 */
        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
        }

        /* 3. 欢迎卡片样式 */
        .welcome-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 3rem 4rem;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            text-align: center;
            /* 添加一个简单的淡入上浮动画 */
            animation: fadeInUp 1s ease-out;
            max-width: 90%;
            width: 500px;
        }

        /* 4. 标题样式 */
        .welcome-card h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            color: #2d3748;
        }

        .welcome-card h1 span {
            color: #764ba2; /* 让名字 xzh 有特殊的颜色 */
            font-weight: 800;
        }

        /* 5. 段落文本样式 */
        .welcome-card p {
            font-size: 1.1rem;
            color: #4a5568;
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        /* 6. 按钮样式及悬停效果 */
        .btn {
            padding: 12px 36px;
            font-size: 1rem;
            font-weight: 600;
            color: #fff;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(118, 75, 162, 0.4);
        }

        .btn:active {
            transform: translateY(-1px);
        }

        /* 7. 动画关键帧 */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <div class="welcome-card">
        <h1>👋 欢迎, <span>xzh</span>!</h1>
        <p>很高兴见到你。这是一个为你专属定制的欢迎页面。<br>希望它能为你带来美好的一天！</p>
        <a href="#" class="btn" onclick="alert('你好，xzh！探索之旅现在开始 🚀')">开始探索</a>
    </div>

</body>
</html>
